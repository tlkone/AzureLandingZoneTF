trigger:
  branches: { include: [ main ] }

variables:
- group: vg-landingzone

pool: { vmImage: ubuntu-latest }

stages:
- stage: Plan
  displayName: "Plan (main)"
  jobs:
  - job: plan
    steps:
    - checkout: self
    - task: TerraformInstaller@1
      inputs: { terraformVersion: '1.7.5' }

    - task: AzureCLI@2
      displayName: "init + plan (prod)"
      inputs:
        azureSubscription: 'sc-azure-landingzone'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail
          cd terraform

          terraform init \
            -backend-config="resource_group_name=$(TF_BACKEND_RG)" \
            -backend-config="storage_account_name=$(TF_STATE_SA)" \
            -backend-config="container_name=$(TF_STATE_CONT)" \
            -backend-config="key=$(TF_STATE_KEY)"

          terraform workspace list | grep -q "prod" || terraform workspace new prod
          terraform workspace select prod

          terraform plan -input=false \
            -var "location=$(LOCATION)" \
            -var "management_group_id=$(MG_ID)" \
            -var-file="environments/prod.tfvars" \
            -out tfplan

          terraform show -no-color tfplan > tfplan.txt

    - publish: terraform/tfplan
      artifact: tfplan
    - publish: terraform/tfplan.txt
      artifact: plantext

- stage: Approval
  displayName: "Manual Approval"
  dependsOn: Plan
  jobs:
  - deployment: wait_for_approval
    environment: prod
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Approved to apply."
            displayName: ok

- stage: Apply
  displayName: "Apply (prod)"
  dependsOn: Approval
  condition: succeeded()
  jobs:
  - job: apply
    steps:
    - checkout: self
    - download: current
      artifact: tfplan

    - task: TerraformInstaller@1
      inputs: { terraformVersion: '1.7.5' }

    - task: AzureCLI@2
      displayName: "init + apply (exact plan)"
      inputs:
        azureSubscription: 'sc-azure-landingzone'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail
          cd terraform

          terraform init \
            -backend-config="resource_group_name=$(TF_BACKEND_RG)" \
            -backend-config="storage_account_name=$(TF_STATE_SA)" \
            -backend-config="container_name=$(TF_STATE_CONT)" \
            -backend-config="key=$(TF_STATE_KEY)"

          terraform workspace select prod
          terraform apply -input=false -auto-approve "$(Pipeline.Workspace)/tfplan/tfplan"
