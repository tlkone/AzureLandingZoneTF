# PR validation – fmt/validate/plan (no apply)
trigger: none
pr:
  branches: { include: ['*'] }

pool:
  name: TLKCloudPool

variables:
  LOCATION: eastus
  TF_BACKEND_RG: tfstate-rg
  TF_STATE_SA: tfstatestorage88kt79         # your existing SA name
  TF_STATE_CONT: tfstate
  TF_STATE_KEY: landingzone/dev.tfstate
  #MG_ID: ba2303f3-2277-44e6-b32f-b346f5736dcc # your MG id, if used

steps:
# 1) Pull SPN creds from the service connection and publish as variables
- task: AzureCLI@2
  displayName: Export SPN to ARM_* variables
  inputs:
    azureSubscription: sc-azure-landingzone
    scriptType: bash
    addSpnToEnvironment: true
    scriptLocation: inlineScript
    inlineScript: |
      echo "##vso[task.setvariable variable=ARM_CLIENT_ID]$servicePrincipalId"
      echo "##vso[task.setvariable variable=ARM_TENANT_ID]$tenantId"
      echo "##vso[task.setvariable variable=ARM_SUBSCRIPTION_ID]$subscriptionId"
      # mark secret:
      echo "##vso[task.setvariable variable=ARM_CLIENT_SECRET;issecret=true]$servicePrincipalKey"

# (optional) ensure backend exists – uses the same service connection session
- task: AzureCLI@2
  displayName: Ensure tfstate storage exists
  inputs:
    azureSubscription: sc-azure-landingzone
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      az group create -n $(TF_BACKEND_RG) -l $(LOCATION)
      if ! az storage account show -n $(TF_STATE_SA) -g $(TF_BACKEND_RG) >/dev/null 2>&1; then
        az storage account create -n $(TF_STATE_SA) -g $(TF_BACKEND_RG) -l $(LOCATION) --sku Standard_LRS
      fi
      az storage container create --account-name $(TF_STATE_SA) --name $(TF_STATE_CONT) || true

# 2) Terraform fmt / init / validate / plan
- script: |
    terraform -version
    terraform fmt -check -recursive

    terraform init \
      -backend-config="resource_group_name=$(TF_BACKEND_RG)" \
      -backend-config="storage_account_name=$(TF_STATE_SA)" \
      -backend-config="container_name=$(TF_STATE_CONT)" \
      -backend-config="key=$(TF_STATE_KEY)"

    terraform validate

    terraform plan \
      -var "location=$(LOCATION)" \
      #-var "management_group_id=$(MG_ID)" \
      -out tfplan.out
  displayName: Terraform validate + plan
  workingDirectory: $(System.DefaultWorkingDirectory)/terraform
  env:
    ARM_CLIENT_ID: $(ARM_CLIENT_ID)
    ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
    ARM_TENANT_ID: $(ARM_TENANT_ID)
    ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
